name: Sovereign-Auto-Hunter-Forge
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auto-Detect and Compile (رادار صيد الملفات)
        run: |
          echo "🔥 بدء تشغيل مفاعل البصرة ذاتي التوجيه..."
          
          # [الرادار]: البحث عن أي ملف ينتهي بـ .mm في المستودع مهما كان اسمه
          TARGET_FILE=$(find . -maxdepth 1 -name "*.mm" | head -n 1)
          
          if [ -z "$TARGET_FILE" ]; then
            echo "❌ خطأ كارثي: لم أجد أي ملف ينتهي بصيغة .mm في واجهة المستودع!"
            echo "تأكد أنك قمت بإنشاء ملف الكود وأنه ينتهي بـ .mm"
            exit 1
          fi
          
          echo "✅ تم رصد النخاع بنجاح: $TARGET_FILE"
          
          # تجهيز بيئة آبل الرسمية
          sudo xcode-select -s /Applications/Xcode.app
          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # أمر الصهر الذي يهاجم الملف الذي وجده الرادار
          clang -dynamiclib -arch arm64 "$TARGET_FILE" -o wsam_soldier.dylib -isysroot $SDK_PATH -framework Foundation -framework UIKit -framework CoreGraphics -framework QuartzCore -fobjc-arc
          
          echo "✅ تمت عملية الصهر بنجاح تام!"

      - name: Upload Sovereign Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wsam-Sovereign-Dylib
          path: wsam_soldier.dylib
